# SLICE-GATE PIPELINE (llmff manifest) — llmff used PURELY as the bounded per-stage EXECUTOR, with
# NO inference. It runs the real limina functional gate (op:tool), validates the JSON verdict
# (validate_json — the same gate llmff applies to every artifact), and traces the run. There is NO
# `infer` stage: writing/revising the slice's game code (CODEGEN) is the AGENT's job — the coordinator
# agent IS the LLM, so the flow never reaches outside the agent to an external model API. The agent
# writes the game in its turn, re-invokes this to re-gate, and owns the build→revise loop; llmff just
# executes + validates + records each gate run deterministically (no provider, no key, no mock model).
#
# __BASH__ / __GATE_SH__ are substituted with absolute paths by slice-builder.mjs.
version: 1
inputs:
  slice:
    path: ./slice.json
graph:
  - id: load_slice
    op: load
    input: slice

  # Execute the REAL limina functional gate for the slice's selected game (op:tool → run-slice-gate.sh).
  - id: run_gate
    op: tool
    from: load_slice
    command: ["__BASH__", "__GATE_SH__"]

  # The gate's JSON verdict must be well-formed (the same validate_json gate llmff applies to every
  # inter-stage artifact). The pass/fail DECISION belongs to the coordinator, which reads this verdict.
  - id: gate_result
    op: validate_json
    from: run_gate
    schema: '{"type":"object","required":["passed","automatedTotal"],"properties":{"passed":{"type":"boolean"},"automatedPassed":{"type":"integer"},"automatedTotal":{"type":"integer"},"detail":{"type":"string"}}}'

outputs:
  result:
    from: gate_result
    path: ./slice-result.json
